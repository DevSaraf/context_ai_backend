name: Build and deploy Python app to Azure Web App - krabai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zip artifact for deployment
        run: |
          zip -r release.zip app/ dashboard.html requirements.txt -x '__pycache__/*' '*.pyc' '.git/*' 'venv/*' 'antenv/*' '.env'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CB932B3CA51642DABCC836F044C38812 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_740DB584A597441888F0D54CE8E0AEB9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BE3B17030F9E4E21A16168AB23D384E6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'krabai'
          slot-name: 'Production'
          package: release.zip
