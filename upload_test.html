<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Knowledge Upload Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #888;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        button {
            padding: 12px 24px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #3a8eef;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
        }
        .success {
            background: #1a3a1a;
            border: 1px solid #51cf66;
        }
        .error {
            background: #3a1a1a;
            border: 1px solid #ff6b6b;
        }
        .warning {
            background: #3a2a1a;
            border: 1px solid #ffa94d;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Knowledge Upload (Test)</h1>

    <div class="warning">
        <strong>Development Only:</strong> This uses a test endpoint without authentication.
        Remove /test/upload endpoint before production.
    </div>

    <div class="form-group">
        <label>Your Email (registered in the extension)</label>
        <input type="email" id="email" placeholder="wizardtech.dev@gmail.com" value="wizardtech.dev@gmail.com">
    </div>

    <div class="form-group">
        <label>Knowledge Content</label>
        <textarea id="content" placeholder="Paste your company knowledge here...">Our company uses FastAPI for backend development.
We prefer PostgreSQL over MySQL for database needs.
All API endpoints should include proper authentication using JWT tokens.
Our standard response time SLA is under 200ms for API calls.
The main tech stack includes Python, React, and PostgreSQL.
Customer support tickets should be responded to within 4 hours.
Our API rate limit is 100 requests per minute per user.
The company was founded in 2020 and is headquartered in San Francisco.
We use Slack for internal communication and Jira for project management.</textarea>
    </div>

    <button id="upload-btn" onclick="uploadKnowledge()">Upload Knowledge</button>

    <div id="result"></div>

    <script>
        async function uploadKnowledge() {
            const email = document.getElementById('email').value.trim();
            const content = document.getElementById('content').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('upload-btn');

            if (!email) {
                resultDiv.innerHTML = '<div class="result error">Please enter your email</div>';
                return;
            }

            if (!content) {
                resultDiv.innerHTML = '<div class="result error">Please enter some knowledge content</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Uploading...';
            resultDiv.innerHTML = '';

            try {
                const response = await fetch('http://127.0.0.1:8000/test/upload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, content })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<div class="result error">
                        <strong>Error:</strong> ${data.error}
                    </div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result success">
                        <strong>Success!</strong><br>
                        ${data.message}<br>
                        Chunks created: ${data.chunks}<br>
                        Company ID: ${data.company_id}
                    </div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">
                    <strong>Connection Error:</strong> ${error.message}<br>
                    Make sure the backend is running at http://127.0.0.1:8000
                </div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload Knowledge';
            }
        }
    </script>
</body>
</html>
